function ColorSwatch({ hex, name, usage }) {
  const [copied, setCopied] = useState(false);
  const isLight = ["#FFFFFF", "#F8FAFC", "#F1F5F9", "#93C5FD", "#E8D5A3"].includes(hex);
  return (
    <div onClick={() => { navigator.clipboard?.writeText(hex); setCopied(true); setTimeout(() => setCopied(false), 1500); }}
      style={{
        background: hex, borderRadius: 12, padding: "14px 12px", cursor: "pointer",
        border: isLight ? "1px solid #E2E8F0" : "1px solid transparent",
        transition: "transform 0.2s, box-shadow 0.2s", minHeight: 100,
        display: "flex", flexDirection: "column", justifyContent: "space-between",
      }}
      onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.03)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(0,0,0,0.12)"; }}
      onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; e.currentTarget.style.boxShadow = "none"; }}
    >
      <div>
        <div style={{ fontWeight: 700, fontSize: 11, color: isLight ? "#1B2A4A" : "#FFFFFF", marginBottom: 2 }}>{name}</div>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: isLight ? "#64748B" : "rgba(255,255,255,0.65)" }}>{copied ? "Copied!" : hex}</div>
      </div>
      <div style={{ fontSize: 9, color: isLight ? "#64748B" : "rgba(255,255,255,0.5)", marginTop: 8, lineHeight: 1.4 }}>{usage}</div>
    </div>
  );
}
