function ColorSwatch({ hex, name, usage }) {
  const [copied, setCopied] = useState(false);
  const isLight = ["#FFFFFF", "#F5F5F0", "#E8D5A3", "#F3F4F6"].includes(hex);
  return (
    <div
      onClick={() => { navigator.clipboard?.writeText(hex); setCopied(true); setTimeout(() => setCopied(false), 1500); }}
      style={{
        background: hex, borderRadius: 12, padding: "16px 14px", cursor: "pointer",
        border: isLight ? "1px solid #E5E7EB" : "1px solid transparent",
        transition: "transform 0.2s, box-shadow 0.2s", minHeight: 110,
        display: "flex", flexDirection: "column", justifyContent: "space-between",
      }}
      onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.03)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(0,0,0,0.15)"; }}
      onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; e.currentTarget.style.boxShadow = "none"; }}
    >
      <div>
        <div style={{ fontFamily: "'Noto Sans JP', sans-serif", fontWeight: 700, fontSize: 12, color: isLight ? "#1B2A4A" : "#FFFFFF", marginBottom: 3 }}>{name}</div>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: isLight ? "#6B7280" : "rgba(255,255,255,0.7)" }}>{copied ? "Copied!" : hex}</div>
      </div>
      <div style={{ fontFamily: "'Noto Sans JP', sans-serif", fontSize: 10, color: isLight ? "#6B7280" : "rgba(255,255,255,0.55)", marginTop: 10, lineHeight: 1.4 }}>{usage}</div>
    </div>
  );
}
