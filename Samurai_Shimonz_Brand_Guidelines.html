function ColorSwatch({ hex, name, usage }) {
  const [copied, setCopied] = useState(false);
  const isLight = ["#FFFFFF", "#FFF7ED", "#E7E5E4", "#FDBA74", "#FCD34D"].includes(hex);
  return (
    <div onClick={() => { navigator.clipboard?.writeText(hex); setCopied(true); setTimeout(() => setCopied(false), 1500); }}
      style={{
        background: hex, borderRadius: 14, padding: "14px 12px", cursor: "pointer",
        border: isLight ? "1px solid #E7E5E4" : "1px solid transparent",
        transition: "transform 0.2s", minHeight: 100,
        display: "flex", flexDirection: "column", justifyContent: "space-between",
      }}
      onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.03)"; }}
      onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; }}
    >
      <div>
        <div style={{ fontWeight: 700, fontSize: 11, color: isLight ? "#292524" : "#FFFFFF", marginBottom: 2 }}>{name}</div>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: isLight ? "#78716C" : "rgba(255,255,255,0.65)" }}>{copied ? "Copied!" : hex}</div>
      </div>
      <div style={{ fontSize: 9, color: isLight ? "#78716C" : "rgba(255,255,255,0.5)", marginTop: 8, lineHeight: 1.4 }}>{usage}</div>
    </div>
  );
}

function SL({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 600, color: "#F97316", letterSpacing: 2, marginBottom: 12 }}>{children}</div>;
